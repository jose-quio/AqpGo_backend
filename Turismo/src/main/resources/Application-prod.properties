# src/main/resources/application-prod.properties
# Este archivo se activa cuando SPRING_PROFILES_ACTIVE=prod
# Los valores reales vienen de las variables de entorno de Render

# ?? Base de datos ?????????????????????????????????????????????
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA ???????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ?? JWT ???????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ?? pg_dump ya est· disponible en el contenedor ???????????????
backup.pgdump.path=pg_dump

# ?? App ???????????????????????????????????????????????????????
server.port=8080
spring.application.name=Turismo